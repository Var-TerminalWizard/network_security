<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Predicted Data</title>
    <style>
        :root {
            --bg: #0f172a;
            --panel: rgba(15, 23, 42, 0.78);
            --panel-border: rgba(148, 163, 184, 0.18);
            --text: #e2e8f0;
            --muted: #94a3b8;
            --accent: #38bdf8;
            --accent-2: #22c55e;
            --row: rgba(30, 41, 59, 0.72);
            --row-alt: rgba(15, 23, 42, 0.55);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            color: var(--text);
            background:
                radial-gradient(circle at top left, rgba(56, 189, 248, 0.22), transparent 32%),
                radial-gradient(circle at bottom right, rgba(34, 197, 94, 0.18), transparent 28%),
                linear-gradient(135deg, #020617 0%, #0f172a 45%, #111827 100%);
            padding: 32px 18px 40px;
        }

        .page {
            max-width: 1300px;
            margin: 0 auto;
        }

        .header {
            display: flex;
            align-items: end;
            justify-content: space-between;
            gap: 16px;
            margin-bottom: 20px;
            padding: 8px 2px;
        }

        .title {
            margin: 0;
            font-size: clamp(1.7rem, 2.8vw, 2.6rem);
            line-height: 1.1;
            letter-spacing: -0.03em;
        }

        .subtitle {
            margin: 8px 0 0;
            color: var(--muted);
            font-size: 0.98rem;
        }

        .badge {
            align-self: flex-start;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 14px;
            border-radius: 999px;
            border: 1px solid rgba(56, 189, 248, 0.26);
            background: rgba(8, 15, 33, 0.72);
            color: #bae6fd;
            font-size: 0.92rem;
            white-space: nowrap;
        }

        .panel {
            background: var(--panel);
            border: 1px solid var(--panel-border);
            border-radius: 20px;
            box-shadow: 0 24px 70px rgba(0, 0, 0, 0.32);
            overflow: hidden;
            backdrop-filter: blur(14px);
        }

        .table-wrap {
            width: 100%;
            overflow: auto;
        }

        table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            min-width: 900px;
        }

        th, td {
            padding: 14px 16px;
            text-align: left;
            border-bottom: 1px solid rgba(148, 163, 184, 0.12);
            vertical-align: top;
        }

        th {
            position: sticky;
            top: 0;
            z-index: 1;
            background: rgba(15, 23, 42, 0.96);
            color: #f8fafc;
            font-weight: 600;
            letter-spacing: 0.02em;
            text-transform: uppercase;
            font-size: 0.78rem;
        }

        tr:nth-child(even) td {
            background: var(--row-alt);
        }

        tr:nth-child(odd) td {
            background: var(--row);
        }

        tr:hover td {
            background: rgba(56, 189, 248, 0.12);
        }

        td {
            color: var(--text);
            font-size: 0.93rem;
            word-break: break-word;
        }

        .footer-note {
            margin-top: 14px;
            color: var(--muted);
            font-size: 0.88rem;
        }

        @media (max-width: 768px) {
            body {
                padding: 20px 12px 28px;
            }

            .header {
                flex-direction: column;
                align-items: flex-start;
            }

            .badge {
                white-space: normal;
            }
        }
    </style>
</head>
<body>
    <main class="page">
        <div class="header">
            <div>
                <h1 class="title">Predicted Data</h1>
                <p class="subtitle">Review the uploaded records and the model’s prediction results below.</p>
            </div>
            <div class="badge">Model output table</div>
        </div>

        <section class="panel">
            <div class="table-wrap">
                {{ table | safe }}
            </div>
        </section>

        <p class="footer-note">
            Tip: if your table is wide, you can scroll horizontally without losing readability.
        </p>
    </main>
</body>
</html>
